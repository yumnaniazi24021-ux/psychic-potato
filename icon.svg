<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Warm white circle background -->
  <circle cx="256" cy="256" r="240" fill="#FFFDF9" stroke="#5C3A21" stroke-width="12"/>
  
  <!-- Group for the Handi Pot Design -->
  <g stroke="#5C3A21" stroke-width="14" stroke-linejoin="round" stroke-linecap="round" fill="none">
    
    <!-- Left Loop Handle -->
    <path d="M 96 320 C 32 320, 32 384, 96 384" />
    
    <!-- Right Loop Handle -->
    <path d="M 416 320 C 480 320, 480 384, 416 384" />
    
    <!-- Squat Domed Lid -->
    <path d="M 144 190 C 144 120, 368 120, 368 190 Z" fill="#C1592C" />
    <path d="M 256 120 L 256 90" stroke-width="16" />
    <circle cx="256" cy="80" r="10" fill="#5C3A21" stroke="none" />
    
    <!-- Wide Collar Rim -->
    <rect x="112" y="190" width="288" height="40" rx="20" fill="#C1592C" />
    
    <!-- Squat Wide Handi Body -->
    <path d="M 128 230 C 64 230, 48 380, 48 410 C 48 460, 144 476, 256 476 C 368 476, 464 460, 464 410 C 464 380, 448 230, 384 230 Z" fill="#C1592C" />
    
    <!-- Painted white slip design wave line -->
    <path d="M 80 360 Q 128 320, 176 360 T 272 360 T 368 360 T 432 360" stroke="#FFFFFF" stroke-width="16" />
    
    <!-- Painted white slip dots -->
    <circle cx="104" cy="310" r="10" fill="#FFFFFF" stroke="none" />
    <circle cx="152" cy="410" r="10" fill="#FFFFFF" stroke="none" />
    <circle cx="200" cy="310" r="10" fill="#FFFFFF" stroke="none" />
    <circle cx="248" cy="410" r="10" fill="#FFFFFF" stroke="none" />
    <circle cx="296" cy="310" r="10" fill="#FFFFFF" stroke="none" />
    <circle cx="344" cy="410" r="10" fill="#FFFFFF" stroke="none" />
    <circle cx="392" cy="310" r="10" fill="#FFFFFF" stroke="none" />
    <circle cx="440" cy="410" r="10" fill="#FFFFFF" stroke="none" />
  </g>
</svg>
